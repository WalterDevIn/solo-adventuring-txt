<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Interfaz experimental para un RPG de texto retro neón."
    />
    <title>Solo Adventuring</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="setup.css" />
    <link rel="stylesheet" href="dice.css" />
    <link rel="stylesheet" href="chat.css" />
    <script src="app.js" type="module"></script>
    <script src="src/diceUi.js" type="module"></script>
    <script src="src/chatUi.js" type="module"></script>
  </head>
  <body>
    <main class="game-shell" aria-label="Interfaz del juego de rol de texto">
      <section class="setup-screen" id="setupScreen" aria-labelledby="setupTitle">
        <header class="setup-header">
          <p class="eyebrow">COMBAT PROTOTYPE / 00</p>
          <h1 id="setupTitle">Configure encounter</h1>
          <p>Select one character and at least one enemy.</p>
        </header>

        <div class="setup-grid">
          <section class="selection-panel" aria-labelledby="characterTitle">
            <div class="panel-heading">
              <span>01</span>
              <h2 id="characterTitle">Character</h2>
            </div>
            <div class="selection-list" id="characterList"></div>
          </section>

          <section class="selection-panel" aria-labelledby="enemyTitle">
            <div class="panel-heading">
              <span>02</span>
              <h2 id="enemyTitle">Enemies</h2>
            </div>
            <div class="selection-list" id="enemyList"></div>
          </section>
        </div>

        <footer class="setup-footer">
          <div class="encounter-summary" id="encounterSummary" aria-live="polite"></div>
          <button class="start-button" id="startBattleButton" type="button" disabled>
            Start combat
          </button>
        </footer>
      </section>

      <section class="console-layout" id="consoleScreen" hidden>
        <div class="console-stack">
          <section
            class="console-box console-box--output"
            id="outputBox"
            aria-live="polite"
          >
            <div class="output-list" id="outputList"></div>
            <p class="output-placeholder" id="outputPlaceholder" aria-hidden="true">.</p>
          </section>

          <form class="console-box console-box--input" id="commandForm">
            <div class="command-highlight" id="commandHighlight" aria-hidden="true"></div>
            <input
              id="commandInput"
              name="command"
              type="text"
              autocomplete="off"
              spellcheck="false"
              aria-label="Comando"
            />
          </form>
        </div>

        <aside class="marker-rail" aria-label="Marcadores">
          <div class="marker-stack" aria-hidden="true">
            <span>◇</span>
            <span>+</span>
            <span>::</span>
            <span>×</span>
            <span>⌁</span>
            <span>#</span>
            <span>[ ]</span>
            <span>!</span>
            <span>·</span>
          </div>
        </aside>
      </section>
    </main>
  </body>
</html>
